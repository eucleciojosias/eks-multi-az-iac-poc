name: IaC CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    name: Validate & plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token for AWS
    env:
      # Credentials are only issued for code we trust: our own branches and
      # manual dispatches, never a forked PR.
      IS_TRUSTED: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: terraform fmt
        run: terraform -chdir=infra fmt -check -diff -recursive

      - uses: terraform-linters/setup-tflint@v4

      - name: tflint
        run: |
          tflint --chdir=infra --init
          tflint --chdir=infra

      # skip-dirs: init vendors third-party modules into infra/.terraform/,
      # including their own examples/ — not our code, so scanning them is noise.
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra
          severity: HIGH,CRITICAL
          exit-code: '0'
          skip-dirs: '**/.terraform'

      - name: Configure AWS credentials (OIDC)
        if: env.IS_TRUSTED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        if: env.IS_TRUSTED == 'true'
        run: terraform -chdir=infra init -input=false

      - name: terraform validate
        if: env.IS_TRUSTED == 'true'
        run: terraform -chdir=infra validate

      - name: terraform plan
        if: env.IS_TRUSTED == 'true'
        run: terraform -chdir=infra plan -out=tfplan -input=false -no-color

      # WARNING: on a PUBLIC repo, workflow artifacts are downloadable by anyone.
      - name: Upload plan artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 1

  apply:
    name: Apply (requires approval)
    runs-on: ubuntu-latest
    needs: [terraform]
    # Manual trigger only
    if: github.event_name == 'workflow_dispatch'
    environment: production
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Download the approved plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: terraform -chdir=infra init -input=false

      - name: terraform apply
        run: terraform -chdir=infra apply -input=false tfplan

  infracost:
    name: Infracost diff
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    env:
      TF_ROOT: infra
    steps:
      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Cost snapshot of base branch
        run: |
          infracost breakdown --path=${TF_ROOT} \
            --format=json \
            --out-file=/tmp/infracost-base.json

      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Cost diff vs base
        run: |
          infracost diff --path=${TF_ROOT} \
            --compare-to=/tmp/infracost-base.json \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Post diff as a PR comment
        run: |
          infracost comment github --path=/tmp/infracost.json \
            --repo=$GITHUB_REPOSITORY \
            --github-token=${{ github.token }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update
